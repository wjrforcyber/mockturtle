name: Coverage CI

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build-gcc11-codecov:
    runs-on: ubuntu-22.04
    name: GNU GCC 11 and run codecov
    
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true
    - name: Build mockturtle
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_CXX_COMPILER=g++-11 -DMOCKTURTLE_BUILD_TESTS=ON -DMOCKTURTLE_ENABLE_COVERAGE=ON ..
        make run_tests
    - name: Run tests
      run: |
        cd build
        ./test/run_tests "~[quality]"
    - name: Run lcov
      run: |
        sudo apt-get install lcov
        lcov -t "result" -o lcov.info -c -d .
        lcov -e lcov.info "*mockturtle/include*" -o lcov_filtered.info
        lcov -l lcov_filtered.info
    - name: CodeCov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./lcov_filtered.info
        disable_search: true
